name: Tests

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "^10.0"
            testbench: "^7.0"
            pest: "^3.0"
            pest_laravel: "^3.0"
          - php: "8.2"
            laravel: "^11.0"
            testbench: "^8.0"
            pest: "^3.0"
            pest_laravel: "^3.0"
          - php: "8.3"
            laravel: "^11.0"
            testbench: "^8.0"
            pest: "^3.0"
            pest_laravel: "^3.0"
          - php: "8.3"
            laravel: "^12.0"
            testbench: "^9.0"
            pest: "^3.0"
            pest_laravel: "^3.0"
          - php: "8.4"
            laravel: "^12.0"
            testbench: "^9.0"
            pest: "^3.0"
            pest_laravel: "^3.0"
          - php: "8.4"
            laravel: "^13.0"
            testbench: "^10.0"
            pest: "^4.0"
            pest_laravel: "^4.0"
          - php: "8.5"
            laravel: "^13.0"
            testbench: "^10.0"
            pest: "^4.0"
            pest_laravel: "^4.0"

    name: "PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          tools: composer:v2
          coverage: none

      - name: Require specific Laravel and test dependencies
        run: |
          composer require \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/routing:${{ matrix.laravel }}" \
            "illuminate/view:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "pestphp/pest:${{ matrix.pest }}" \
            "pestphp/pest-plugin-laravel:${{ matrix.pest_laravel }}" \
            --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-stable --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/pest
